version: "3.9"

services:
  app:
    container_name: galileo-legacy

    build:
      context: .
      dockerfile: Dockerfile

    restart: unless-stopped

    ports:
      - "8081:8080"

    environment:
      TZ: America/Asuncion

      JAVA_OPTS: >
        -Xms512m
        -Xmx1024m
        -XX:+UseG1GC
        -Dfile.encoding=UTF-8

    volumes:
      - tomcat_logs:/usr/local/tomcat/logs

    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost:8080/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
volumes:
  tomcat_logs: